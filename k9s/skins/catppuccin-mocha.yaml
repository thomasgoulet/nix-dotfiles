# Catppuccin Mocha presets
foreground: &foreground "#CDD6F4"
background: &background "#1E1E2E"
black: &black "#45475A"
blue: &blue "#89B4FA"
green: &green "#A6E3A1"
grey: &grey "#6C7086"
orange: &orange "#FAB387"
purple: &purple "#CBA6F7"
red: &red "#F38BA8"
yellow: &yellow "#F9E2AF"
teal: &teal "#94E2D5"
surface0: &surface0 "#313244"

k9s:
  body:
    fgColor: *foreground
    bgColor: default
    logoColor: *green
  prompt:
    fgColor: *foreground
    bgColor: default
    suggestColor: *orange
  info:
    fgColor: *grey
    sectionColor: *green
  dialog:
    fgColor: *black
    bgColor: default
    buttonFgColor: *foreground
    buttonBgColor: *green
    buttonFocusFgColor: *black
    buttonFocusBgColor: *green
    labelFgColor: *orange
    fieldFgColor: *green
  frame:
    border:
      fgColor: *surface0
      focusColor: *surface0
    menu:
      fgColor: *grey
      keyColor: *yellow
      numKeyColor: *yellow
    crumbs:
      fgColor: *foreground
      bgColor: *surface0
      activeColor: *blue
    status:
      newColor: *green
      modifyColor: *blue
      addColor: *grey
      pendingColor: *orange
      errorColor: *red
      highlightColor: *yellow
      killColor: *purple
      completedColor: *grey
    title:
      fgColor: *blue
      bgColor: default
      highlightColor: *purple
      counterColor: *foreground
      filterColor: *blue
  views:
    charts:
      bgColor: *surface0
      defaultDialColors:
        - *green
        - *red
      defaultChartColors:
        - *green
        - *red
    table:
      fgColor: *yellow
      bgColor: default
      cursorFgColor: *black
      cursorBgColor: *blue
      markColor: *orange
      header:
        fgColor: *blue
        bgColor: default
        sorterColor: *orange
    xray:
      fgColor: *blue
      bgColor: default
      cursorColor: *surface0
      graphicColor: *orange
    yaml:
      keyColor: *green
      colonColor: *grey
      valueColor: *yellow
    logs:
      fgColor: default
      bgColor: default
      indicator:
        fgColor: *blue
        bgColor: default
    help:
      fgColor: *grey
      bgColor: *surface0
      indicator:
        fgColor: *blue
